services:
  - type: web
    name: knowledge-shopping-server
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: agent-data
      mountPath: /opt/render/project/data
      sizeGB: 1
